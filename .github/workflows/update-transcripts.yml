name: Update Transcripts

on:
  schedule:
    # Sunday at noon PST (20:00 UTC)
    - cron: '0 20 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install youtube-transcript-api

      - name: Fetch new episodes
        run: python scripts/fetch_new_episodes.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ index/
          if git diff --cached --quiet; then
            echo "No new transcripts to commit."
          else
            git commit -m "Add new Behind the Craft transcripts (automated)"
            git push
          fi
